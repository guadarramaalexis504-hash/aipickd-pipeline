name: "SEO Backfill (categories + rich results)"

# Two-step SEO maintenance on existing published articles → higher CTR:
#   1. Categorize uncategorized posts (deterministic, from each article's niche)
#   2. Add/upgrade Schema.org JSON-LD (review stars, breadcrumb path, dates)
# Categorization runs FIRST so breadcrumbs pick up the correct category.
# Manual trigger only — a one-off / occasional maintenance job, not a cron.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "add-only (skip posts with schema) or upgrade (replace existing)"
        required: false
        type: choice
        options:
          - "upgrade"
          - "add-only"
        default: "upgrade"
      limit:
        description: "Max articles to process (blank = all)"
        required: false
        default: ""
      lang:
        description: "Only this language (e.g. es). Blank = all."
        required: false
        default: ""
      dry_run:
        description: "Dry run (report only, write nothing)"
        required: false
        type: choice
        options:
          - "false"
          - "true"
        default: "true"

permissions:
  contents: read

concurrency:
  group: aipickd-mutations
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup AIPickd environment
        uses: ./.github/actions/setup-env
        with:
          supabase-url: ${{ secrets.SUPABASE_URL }}
          supabase-service-role-key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          wp-username: ${{ secrets.WP_USERNAME }}
          wp-admin-password: ${{ secrets.WP_ADMIN_PASSWORD }}
          discord-webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          discord-webhook-pipeline: ${{ secrets.DISCORD_WEBHOOK_PIPELINE }}

      # continue-on-error: a transient network blip to Hostinger on the first
      # WP call shouldn't abort the whole backfill — let schema still run.
      - name: Categorize uncategorized posts
        continue-on-error: true
        env:
          LIMIT: ${{ github.event.inputs.limit }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'true' }}
        run: |
          ARGS=()
          if [ "$DRY_RUN" = "true" ]; then ARGS+=(--dry-run); fi
          if [ -n "$LIMIT" ]; then ARGS+=(--limit "$LIMIT"); fi
          echo "Running: node scripts/categorize-posts.js ${ARGS[*]}"
          node scripts/categorize-posts.js "${ARGS[@]}"

      - name: Run schema backfill
        continue-on-error: true
        env:
          MODE: ${{ github.event.inputs.mode || 'upgrade' }}
          LIMIT: ${{ github.event.inputs.limit }}
          LANG: ${{ github.event.inputs.lang }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'true' }}
        run: |
          ARGS=()
          if [ "$MODE" = "upgrade" ]; then ARGS+=(--upgrade); fi
          # add-schema-markup.js writes only with an explicit write flag; pass
          # --go on a live run (previously omitted, so "live" silently no-op'd).
          if [ "$DRY_RUN" = "true" ]; then ARGS+=(--dry-run); else ARGS+=(--go); fi
          if [ -n "$LIMIT" ]; then ARGS+=(--limit "$LIMIT"); fi
          if [ -n "$LANG" ]; then ARGS+=(--lang "$LANG"); fi
          echo "Running: node scripts/add-schema-markup.js ${ARGS[*]}"
          node scripts/add-schema-markup.js "${ARGS[@]}"

      - name: Ping sitemap after schema changes
        if: ${{ github.event.inputs.dry_run != 'true' }}
        continue-on-error: true
        run: node scripts/sitemap-update.js
