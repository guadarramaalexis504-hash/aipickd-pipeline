name: "Schema Backfill (rich results)"

# Adds/upgrades Schema.org JSON-LD on existing published articles so Google can
# show rich results (review stars, breadcrumb path, dates) → higher CTR.
# Manual trigger only — this is a one-off / occasional maintenance job, not a cron.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "add-only (skip posts with schema) or upgrade (replace existing)"
        required: false
        type: choice
        options:
          - "upgrade"
          - "add-only"
        default: "upgrade"
      limit:
        description: "Max articles to process (blank = all)"
        required: false
        default: ""
      dry_run:
        description: "Dry run (report only, write nothing)"
        required: false
        type: choice
        options:
          - "false"
          - "true"
        default: "true"

permissions:
  contents: read

concurrency:
  group: aipickd-mutations
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup AIPickd environment
        uses: ./.github/actions/setup-env
        with:
          supabase-url: ${{ secrets.SUPABASE_URL }}
          supabase-service-role-key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          wp-username: ${{ secrets.WP_USERNAME }}
          wp-admin-password: ${{ secrets.WP_ADMIN_PASSWORD }}
          discord-webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          discord-webhook-pipeline: ${{ secrets.DISCORD_WEBHOOK_PIPELINE }}

      - name: Run schema backfill
        env:
          MODE: ${{ github.event.inputs.mode || 'upgrade' }}
          LIMIT: ${{ github.event.inputs.limit }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'true' }}
        run: |
          ARGS=""
          if [ "$MODE" = "upgrade" ]; then ARGS="$ARGS --upgrade"; fi
          if [ "$DRY_RUN" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          if [ -n "$LIMIT" ]; then ARGS="$ARGS --limit $LIMIT"; fi
          echo "Running: node scripts/add-schema-markup.js $ARGS"
          node scripts/add-schema-markup.js $ARGS

      - name: Ping sitemap after schema changes
        if: ${{ github.event.inputs.dry_run != 'true' }}
        continue-on-error: true
        run: node scripts/sitemap-update.js
