name: Weekly Report & Intelligence

on:
  schedule:
    # Every Monday at 11am UTC (5am Mexico City)
    - cron: "0 11 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  weekly:
    name: Weekly report + cluster analysis + content gap
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --ignore-scripts

      - name: Reconstruct .env
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_ADMIN_PASSWORD: ${{ secrets.WP_ADMIN_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_WEBHOOK_ALERTAS: ${{ secrets.DISCORD_WEBHOOK_ALERTAS }}
          DISCORD_WEBHOOK_PIPELINE: ${{ secrets.DISCORD_WEBHOOK_PIPELINE }}
          DISCORD_WEBHOOK_REPORTES: ${{ secrets.DISCORD_WEBHOOK_REPORTES }}
        run: |
          umask 077
          {
            echo "SUPABASE_URL=\"${SUPABASE_URL}\""
            echo "SUPABASE_SERVICE_ROLE_KEY=\"${SUPABASE_SERVICE_ROLE_KEY}\""
            echo "WP_USERNAME=\"${WP_USERNAME}\""
            echo "WP_ADMIN_PASSWORD=\"${WP_ADMIN_PASSWORD}\""
            echo "OPENAI_API_KEY=\"${OPENAI_API_KEY}\""
            echo "DISCORD_WEBHOOK_URL=\"${DISCORD_WEBHOOK_URL}\""
            echo "DISCORD_WEBHOOK_ALERTAS=\"${DISCORD_WEBHOOK_ALERTAS}\""
            echo "DISCORD_WEBHOOK_PIPELINE=\"${DISCORD_WEBHOOK_PIPELINE}\""
            echo "DISCORD_WEBHOOK_REPORTES=\"${DISCORD_WEBHOOK_REPORTES}\""
          } > .env

      - name: Generate weekly report + send to Discord
        run: node scripts/weekly-report.js

      - name: Run topic cluster analysis
        run: node scripts/cluster-linker.js --threshold 5
        continue-on-error: true

      - name: Generate content gap report
        run: node scripts/content-gap.js --notify
        continue-on-error: true

      - name: Apply seasonal keyword boosts
        run: node scripts/seasonal-boost.js --apply
        continue-on-error: true

      - name: Always shred .env
        if: always()
        run: rm -f .env
