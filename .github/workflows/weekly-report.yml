name: Weekly Report & Intelligence

on:
  schedule:
    # Every Monday at 11am UTC (5am Mexico City)
    - cron: "0 11 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  weekly:
    name: Weekly report + cluster analysis + content gap
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup AIPickd environment
        uses: ./.github/actions/setup-env
        with:
          supabase-url: ${{ secrets.SUPABASE_URL }}
          supabase-service-role-key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          wp-username: ${{ secrets.WP_USERNAME }}
          wp-admin-password: ${{ secrets.WP_ADMIN_PASSWORD }}
          discord-webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          discord-webhook-alertas: ${{ secrets.DISCORD_WEBHOOK_ALERTAS }}
          discord-webhook-pipeline: ${{ secrets.DISCORD_WEBHOOK_PIPELINE }}
          discord-webhook-reportes: ${{ secrets.DISCORD_WEBHOOK_REPORTES }}

      - name: Generate weekly report + send to Discord
        env:
          DISCORD_WEBHOOK_REPORTES: ${{ secrets.DISCORD_WEBHOOK_REPORTES }}
        run: node scripts/weekly-report.js

      - name: Run topic cluster analysis
        run: node scripts/cluster-linker.js --threshold 5
        continue-on-error: true

      - name: Generate content gap report
        run: node scripts/content-gap.js --notify
        continue-on-error: true

      - name: Apply seasonal keyword boosts
        run: node scripts/seasonal-boost.js --apply
        continue-on-error: true
