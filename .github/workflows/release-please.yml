name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # release-please opens a release PR, which requires the repo setting
    # Settings → Actions → General → Workflow permissions →
    # "Allow GitHub Actions to create and approve pull requests" (off by default).
    # Until that's enabled it fails with "GitHub Actions is not permitted to create
    # or approve pull requests". That's benign for a content pipeline (nothing is
    # released), so don't let it mark every push to main as failed. Enable the
    # setting and it works automatically — then this continue-on-error is a no-op.
    continue-on-error: true
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          release-type: node
          # Conventional Commits parsed from PR titles + commit messages.
          # Bumps package.json version, generates CHANGELOG.md, opens a
          # release PR. Merging that PR creates a git tag + GH release.
