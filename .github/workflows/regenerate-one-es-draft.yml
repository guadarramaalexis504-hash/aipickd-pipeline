name: Regenerate One Spanish Draft

on:
  workflow_dispatch:
    inputs:
      confirm_regenerate:
        description: "Type REGENERATE_ONE_ES_DRAFT to regenerate one Spanish draft"
        required: true
        default: ""
      article_id:
        description: "Unpublished Spanish draft article id to retire"
        required: true
        default: "ab0041d0-303f-4d14-a8b2-0a41c06ae805"
      keyword_id:
        description: "Spanish keyword id to requeue and regenerate"
        required: true
        default: "58a4cb28-0a04-4c19-aa1d-0e676335301e"

permissions:
  contents: read

concurrency:
  group: aipickd-mutations
  cancel-in-progress: false

jobs:
  regenerate:
    name: Regenerate one Spanish draft
    runs-on: ubuntu-latest
    timeout-minutes: 50

    env:
      AUTO_PUBLISH: "false"
      DAILY_BUDGET: "3"
      MONTHLY_BUDGET: "50"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup AIPickd environment
        uses: ./.github/actions/setup-env
        with:
          supabase-url: ${{ secrets.SUPABASE_URL }}
          supabase-service-role-key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          wp-username: ${{ secrets.WP_USERNAME }}
          wp-admin-password: ${{ secrets.WP_ADMIN_PASSWORD }}
          discord-webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          discord-webhook-articulos: ${{ secrets.DISCORD_WEBHOOK_ARTICULOS }}
          discord-webhook-pipeline: ${{ secrets.DISCORD_WEBHOOK_PIPELINE }}
          discord-webhook-alertas: ${{ secrets.DISCORD_WEBHOOK_ALERTAS }}

      - name: Require main branch
        run: |
          if [ "$GITHUB_REF_NAME" != "main" ]; then
            echo "Refusing to run: this workflow must be dispatched from main."
            exit 1
          fi

      - name: Require explicit regeneration confirmation
        env:
          CONFIRM_REGENERATE: ${{ github.event.inputs.confirm_regenerate }}
        run: |
          if [ "$CONFIRM_REGENERATE" != "REGENERATE_ONE_ES_DRAFT" ]; then
            echo "Refusing to run: confirm_regenerate must be REGENERATE_ONE_ES_DRAFT."
            exit 1
          fi

      - name: Require valid Spanish draft id and approved keyword
        env:
          ARTICLE_ID: ${{ github.event.inputs.article_id }}
          KEYWORD_ID: ${{ github.event.inputs.keyword_id }}
          APPROVED_KEYWORD_IDS: >-
            ff36854c-ed82-4066-a737-3063869d0c8b
            58a4cb28-0a04-4c19-aa1d-0e676335301e
        run: |
          uuid_re='^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$'
          if [[ ! "$ARTICLE_ID" =~ $uuid_re ]]; then
            echo "Refusing to run: article_id must be a valid UUID."
            exit 1
          fi
          if [[ ! "$KEYWORD_ID" =~ $uuid_re ]]; then
            echo "Refusing to run: keyword_id must be a valid UUID."
            exit 1
          fi
          case " $APPROVED_KEYWORD_IDS " in
            *" $KEYWORD_ID "*) ;;
            *)
              echo "Refusing to run: keyword_id must be one of the approved Spanish smoke keyword IDs."
              echo "Approved keyword IDs: $APPROVED_KEYWORD_IDS"
              exit 1
              ;;
          esac

          echo "Approved Spanish smoke keyword accepted: $KEYWORD_ID."
          echo "Script preflight will verify article/keyword linkage, unpublished WP fields, disabled global ES gate, and detectable QA reason before writes."

      - name: Regenerate one Spanish draft
        env:
          ARTICLE_ID: ${{ github.event.inputs.article_id }}
          KEYWORD_ID: ${{ github.event.inputs.keyword_id }}
          CONFIRM_REGENERATE: ${{ github.event.inputs.confirm_regenerate }}
        run: |
          echo "Running controlled ES regeneration: retire bad draft, reset one keyword, generate one replacement draft, --no-pub."
          node scripts/regenerate-one-es-draft.js \
            --go \
            --confirm "$CONFIRM_REGENERATE" \
            --article-id "$ARTICLE_ID" \
            --keyword-id "$KEYWORD_ID"
