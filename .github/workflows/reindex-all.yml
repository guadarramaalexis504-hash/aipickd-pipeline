name: Re-Index All Articles

on:
  workflow_dispatch:

# Minimal permissions — only reads code + calls external APIs
permissions:
  contents: read

concurrency:
  group: aipickd-reindex
  cancel-in-progress: false

jobs:
  reindex:
    name: Bulk re-submit all published articles to search engines
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --ignore-scripts || npm install --no-audit --no-fund --ignore-scripts

      - name: Reconstruct .env
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DISCORD_WEBHOOK_ALERTAS: ${{ secrets.DISCORD_WEBHOOK_ALERTAS }}
        run: |
          umask 077
          {
            echo "SUPABASE_URL=\"${SUPABASE_URL}\""
            echo "SUPABASE_SERVICE_ROLE_KEY=\"${SUPABASE_SERVICE_ROLE_KEY}\""
            echo "DISCORD_WEBHOOK_ALERTAS=\"${DISCORD_WEBHOOK_ALERTAS}\""
          } > .env

      - name: Ping sitemap to Google + Bing
        run: node scripts/sitemap-update.js

      - name: Bulk submit all URLs to IndexNow (Bing + Yandex)
        run: node scripts/bulk-indexnow.js

      - name: Notify Discord — reindex complete
        if: always()
        env:
          DISCORD_WEBHOOK_ALERTAS: ${{ secrets.DISCORD_WEBHOOK_ALERTAS }}
        run: |
          node -e "
          const webhook = process.env.DISCORD_WEBHOOK_ALERTAS;
          if (!webhook) { console.log('No webhook configured'); process.exit(0); }
          fetch(webhook, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              content: '🔍 **Re-indexación masiva completada**\n✅ Sitemap pingeado a Google + Bing\n✅ Todos los URLs enviados a IndexNow (Bing/Yandex)\n\n⏱️ Bing: 24-72h | Google: 1-4 semanas\n💡 Recuerda enviar el sitemap en Google Search Console manualmente.'
            })
          }).then(r => console.log('Discord:', r.status)).catch(console.error);
          "

      - name: Always shred .env
        if: always()
        run: |
          if [ -f .env ]; then
            shred -u .env 2>/dev/null || rm -f .env
          fi
