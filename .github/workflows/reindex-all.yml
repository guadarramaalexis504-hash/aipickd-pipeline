name: Re-Index All Articles

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: aipickd-reindex
  cancel-in-progress: false

jobs:
  reindex:
    name: Bulk re-submit all published articles to search engines
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup AIPickd environment
        uses: ./.github/actions/setup-env
        with:
          supabase-url: ${{ secrets.SUPABASE_URL }}
          supabase-service-role-key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          discord-webhook-alertas: ${{ secrets.DISCORD_WEBHOOK_ALERTAS }}

      - name: Ping sitemap to Google + Bing
        run: node scripts/sitemap-update.js

      - name: Bulk submit all URLs to IndexNow (Bing + Yandex)
        run: node scripts/bulk-indexnow.js

      - name: Notify Discord — reindex complete
        if: always()
        run: |
          node -e "
          const { notify } = require('./scripts/notify.js');
          notify('alertas', { content: '🔍 **Re-indexación masiva completada**\n✅ Sitemap pingeado a Google + Bing\n✅ Todos los URLs enviados a IndexNow (Bing/Yandex)\n\n⏱️ Bing: 24-72h | Google: 1-4 semanas\n💡 Recuerda enviar el sitemap en Google Search Console manualmente.' })
            .then(r => console.log('Discord:', r.ok ? 'OK' : r.reason || r.status));
          "
