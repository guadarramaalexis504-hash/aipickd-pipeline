name: AIPickd Auto-Generation

on:
  schedule:
    # Every 4 hours UTC. ~6 articles/day.
    - cron: "0 */4 * * *"
  workflow_dispatch:
    inputs:
      gen_count:
        description: "Articles to generate (1-5)"
        required: false
        default: "1"

permissions:
  contents: read

# Two-level concurrency: this workflow doesn't race itself AND doesn't race
# any other workflow that mutates Supabase (auto-keywords, dedup-keywords, etc).
concurrency:
  group: aipickd-mutations
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      AUTO_PUBLISH: "true"
      DAILY_BUDGET: "3"
      MONTHLY_BUDGET: "50"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup AIPickd environment
        uses: ./.github/actions/setup-env
        with:
          supabase-url: ${{ secrets.SUPABASE_URL }}
          supabase-service-role-key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          wp-username: ${{ secrets.WP_USERNAME }}
          wp-admin-password: ${{ secrets.WP_ADMIN_PASSWORD }}
          discord-webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          discord-webhook-articulos: ${{ secrets.DISCORD_WEBHOOK_ARTICULOS }}
          discord-webhook-pipeline: ${{ secrets.DISCORD_WEBHOOK_PIPELINE }}
          discord-webhook-alertas: ${{ secrets.DISCORD_WEBHOOK_ALERTAS }}

      # ── Critical: any failure here MUST stop the pipeline ──────────────
      - name: Validate secrets present
        run: node scripts/validate-secrets.js

      - name: Enforce daily/monthly budget
        run: node scripts/cost-monitor.js --enforce

      - name: Run pipeline (generate + publish)
        id: run-pipeline
        run: |
          DAY_OF_WEEK=$(date -u +%u)  # 1=Mon ... 6=Sat, 7=Sun
          if [ -n "${{ github.event.inputs.gen_count }}" ]; then
            GEN="${{ github.event.inputs.gen_count }}"
          elif [ "$DAY_OF_WEEK" -eq "6" ] || [ "$DAY_OF_WEEK" -eq "7" ]; then
            GEN=2
            echo "🗓️ Weekend burst mode: generating 2 articles (day $DAY_OF_WEEK)"
          else
            GEN=1
          fi
          if [ "$GEN" -gt 5 ]; then GEN=5; fi
          node scripts/run-pipeline.js --gen "$GEN"

      # ── Post-publish steps: failures here are NON-CRITICAL ─────────────
      # The article is already published. If sitemap ping fails, that's
      # recoverable. We track failures in step outputs and report them in
      # the final Discord notification — no false "PIPELINE FAILED" alarms.
      - name: Auto-refill keyword queue (if < 50 keywords)
        id: post-keywords
        continue-on-error: true
        run: node scripts/auto-keywords.js

      - name: Dedup keyword queue (remove similar keywords)
        id: post-dedup-keywords
        continue-on-error: true
        run: node scripts/dedup-keywords.js --fix

      - name: Cleanup stuck drafts (draft >5 days with no WP post)
        id: post-cleanup-drafts
        continue-on-error: true
        run: node scripts/cleanup-stuck-drafts.js

      - name: Auto-dedup WordPress (remove duplicate posts)
        id: post-dedup-wp
        continue-on-error: true
        run: node scripts/dedup-wordpress.js --fix --quiet

      - name: Add internal links to newly published articles
        id: post-internal-links
        continue-on-error: true
        run: node scripts/internal-links.js --hours 6

      - name: Inject CTA buttons + reading time into new articles
        id: post-cta
        continue-on-error: true
        run: node scripts/cta-injector.js --hours 6 --go

      - name: Trending keywords (Mondays only)
        id: post-trending
        continue-on-error: true
        run: node scripts/trending-keywords.js

      - name: Queue stale articles for refresh
        id: post-refresh
        continue-on-error: true
        run: node scripts/article-refresh.js

      - name: Ping sitemap to Google + Bing (post-publish)
        id: post-sitemap
        continue-on-error: true
        run: node scripts/sitemap-update.js

      - name: Submit all published URLs to IndexNow (Bing/Yandex)
        id: post-indexnow
        continue-on-error: true
        run: node scripts/bulk-indexnow.js

      - name: Notify Discord — pipeline completed
        if: success()
        env:
          GEN_COUNT: ${{ github.event.inputs.gen_count || '1' }}
          POST_KEYWORDS: ${{ steps.post-keywords.outcome }}
          POST_DEDUP_KEYWORDS: ${{ steps.post-dedup-keywords.outcome }}
          POST_CLEANUP_DRAFTS: ${{ steps.post-cleanup-drafts.outcome }}
          POST_DEDUP_WP: ${{ steps.post-dedup-wp.outcome }}
          POST_INTERNAL_LINKS: ${{ steps.post-internal-links.outcome }}
          POST_CTA: ${{ steps.post-cta.outcome }}
          POST_TRENDING: ${{ steps.post-trending.outcome }}
          POST_REFRESH: ${{ steps.post-refresh.outcome }}
          POST_SITEMAP: ${{ steps.post-sitemap.outcome }}
          POST_INDEXNOW: ${{ steps.post-indexnow.outcome }}
        run: |
          node -e "
          const { notifyPipeline } = require('./scripts/notify.js');
          const steps = {
            'auto-keywords':      process.env.POST_KEYWORDS,
            'dedup-keywords':     process.env.POST_DEDUP_KEYWORDS,
            'cleanup-drafts':     process.env.POST_CLEANUP_DRAFTS,
            'dedup-wordpress':    process.env.POST_DEDUP_WP,
            'internal-links':     process.env.POST_INTERNAL_LINKS,
            'cta-injector':       process.env.POST_CTA,
            'trending-keywords':  process.env.POST_TRENDING,
            'article-refresh':    process.env.POST_REFRESH,
            'sitemap-update':     process.env.POST_SITEMAP,
            'bulk-indexnow':      process.env.POST_INDEXNOW,
          };
          const failed = Object.entries(steps).filter(([, v]) => v === 'failure').map(([k]) => k);
          const msg = failed.length === 0
            ? '✅ Pipeline completado exitosamente'
            : '⚠️ Pipeline completado con ' + failed.length + ' post-step(s) fallidos: ' + failed.join(', ');
          notifyPipeline(msg, {
            articlesGenerated: process.env.GEN_COUNT,
            keywordsRemaining: 0,
            postStepsFailed: failed,
          }).then(r => console.log('Discord:', r.ok ? 'OK' : r.reason || r.status));
          "

      - name: Notify Discord — pipeline failed
        if: failure()
        run: |
          node -e "
          const { notifyAlert } = require('./scripts/notify.js');
          notifyAlert('Pipeline FALLÓ en GitHub Actions\n\nRevisa los logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}', 'critical')
            .then(r => console.log('Alert:', r.ok ? 'OK' : r.reason));
          "

      - name: Ping healthchecks.io heartbeat
        if: always()
        continue-on-error: true
        run: |
          node -e "
          const { ping } = require('./scripts/lib/heartbeat');
          const state = '${{ job.status }}' === 'success' ? 'success' : 'fail';
          ping('GENERATE', { state, message: 'job.status=${{ job.status }}' })
            .then(r => console.log('Heartbeat:', r.ok ? 'OK' : r.reason));
          "
