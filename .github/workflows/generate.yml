name: AIPickd Auto-Generation

on:
  # Cron: every 4 hours (UTC). Adjust as needed.
  schedule:
    - cron: "0 */4 * * *"
  # Allow manual trigger from Actions tab
  workflow_dispatch:
    inputs:
      gen_count:
        description: "Articles to generate"
        required: false
        default: "1"

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Reconstruct .env from secrets
        run: |
          cat > .env <<EOF
          SUPABASE_URL="${{ secrets.SUPABASE_URL }}"
          SUPABASE_SERVICE_ROLE_KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
          OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}"
          ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}"
          WP_USERNAME="${{ secrets.WP_USERNAME }}"
          WP_ADMIN_PASSWORD="${{ secrets.WP_ADMIN_PASSWORD }}"
          AUTO_PUBLISH="true"
          DAILY_BUDGET="2"
          EOF

      - name: Run pipeline (generate + publish)
        run: |
          GEN="${{ github.event.inputs.gen_count || '1' }}"
          node scripts/run-pipeline.js --gen "$GEN"

      - name: Run health check
        if: always()
        run: node scripts/health-check.js
