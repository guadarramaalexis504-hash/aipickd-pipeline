name: AIPickd Auto-Generation

on:
  schedule:
    # Every 4 hours UTC. ~6 articles/day.
    - cron: "0 */4 * * *"
  workflow_dispatch:
    inputs:
      gen_count:
        description: "Articles to generate (1-5)"
        required: false
        default: "1"

# Minimal permissions — workflow only reads code + writes to external APIs.
permissions:
  contents: read

# Prevent two pipelines from running concurrently (they'd race on keyword queue).
concurrency:
  group: aipickd-generate
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --ignore-scripts || npm install --no-audit --no-fund --ignore-scripts

      - name: Reconstruct .env from secrets (in-memory only)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_ADMIN_PASSWORD: ${{ secrets.WP_ADMIN_PASSWORD }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_WEBHOOK_ARTICULOS: ${{ secrets.DISCORD_WEBHOOK_ARTICULOS }}
          DISCORD_WEBHOOK_PIPELINE: ${{ secrets.DISCORD_WEBHOOK_PIPELINE }}
          DISCORD_WEBHOOK_ALERTAS: ${{ secrets.DISCORD_WEBHOOK_ALERTAS }}
        run: |
          umask 077
          {
            echo "SUPABASE_URL=\"${SUPABASE_URL}\""
            echo "SUPABASE_SERVICE_ROLE_KEY=\"${SUPABASE_SERVICE_ROLE_KEY}\""
            echo "OPENAI_API_KEY=\"${OPENAI_API_KEY}\""
            echo "ANTHROPIC_API_KEY=\"${ANTHROPIC_API_KEY}\""
            echo "WP_USERNAME=\"${WP_USERNAME}\""
            echo "WP_ADMIN_PASSWORD=\"${WP_ADMIN_PASSWORD}\""
            echo "AUTO_PUBLISH=\"true\""
            echo "DAILY_BUDGET=\"2\""
            echo "DISCORD_WEBHOOK_URL=\"${DISCORD_WEBHOOK_URL}\""
            echo "DISCORD_WEBHOOK_ARTICULOS=\"${DISCORD_WEBHOOK_ARTICULOS}\""
            echo "DISCORD_WEBHOOK_PIPELINE=\"${DISCORD_WEBHOOK_PIPELINE}\""
            echo "DISCORD_WEBHOOK_ALERTAS=\"${DISCORD_WEBHOOK_ALERTAS}\""
          } > .env

      - name: Validate secrets present
        run: node scripts/validate-secrets.js

      - name: Enforce daily/monthly budget
        env:
          DAILY_BUDGET: "3"
          MONTHLY_BUDGET: "50"
        run: node scripts/cost-monitor.js --enforce

      - name: Run pipeline (generate + publish)
        run: |
          # Weekend burst mode: generate 2 articles on Sat/Sun to boost weekly output
          DAY_OF_WEEK=$(date -u +%u)  # 1=Mon ... 6=Sat, 7=Sun
          if [ -n "${{ github.event.inputs.gen_count }}" ]; then
            GEN="${{ github.event.inputs.gen_count }}"
          elif [ "$DAY_OF_WEEK" -eq "6" ] || [ "$DAY_OF_WEEK" -eq "7" ]; then
            GEN=2
            echo "🗓️ Weekend burst mode: generating 2 articles (day $DAY_OF_WEEK)"
          else
            GEN=1
          fi
          # Cap to 5 max even if user requests more
          if [ "$GEN" -gt 5 ]; then GEN=5; fi
          node scripts/run-pipeline.js --gen "$GEN"

      - name: Auto-refill keyword queue (if < 50 keywords)
        if: success()
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node scripts/auto-keywords.js

      - name: Dedup keyword queue (remove similar keywords)
        if: success()
        run: node scripts/dedup-keywords.js --fix

      - name: Cleanup stuck drafts (draft >5 days with no WP post)
        if: success()
        run: node scripts/cleanup-stuck-drafts.js

      - name: Auto-dedup WordPress (remove duplicate posts)
        if: success()
        run: node scripts/dedup-wordpress.js --fix --quiet

      - name: Add internal links to newly published articles
        if: success()
        run: node scripts/internal-links.js --hours 6

      - name: Inject CTA buttons + reading time into new articles
        if: success()
        run: node scripts/cta-injector.js --hours 6 --go

      - name: Trending keywords (Mondays only)
        if: success()
        run: node scripts/trending-keywords.js

      - name: Queue stale articles for refresh
        if: success()
        run: node scripts/article-refresh.js

      - name: Ping sitemap to Google + Bing (post-publish)
        if: success()
        run: node scripts/sitemap-update.js

      - name: Submit all published URLs to IndexNow (Bing/Yandex)
        if: success()
        run: node scripts/bulk-indexnow.js

      - name: Notify Discord — pipeline completed
        if: success()
        run: |
          node -e "
          const {notifyPipeline} = require('./scripts/notify.js');
          notifyPipeline('✅ Pipeline completado exitosamente', {
            articlesGenerated: ${{ github.event.inputs.gen_count || '1' }},
            keywordsRemaining: 0,
          }).then(r => console.log('Discord:', r.ok ? 'OK' : r.reason || r.status));
          "

      - name: Notify Discord — pipeline failed
        if: failure()
        run: |
          node -e "
          const {notifyAlert} = require('./scripts/notify.js');
          notifyAlert('Pipeline FALLÓ en GitHub Actions\n\nRevisa los logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}', 'critical')
            .then(r => console.log('Alert:', r.ok ? 'OK' : r.reason));
          "

      - name: Always shred .env at end
        if: always()
        run: |
          if [ -f .env ]; then
            shred -u .env 2>/dev/null || rm -f .env
          fi
