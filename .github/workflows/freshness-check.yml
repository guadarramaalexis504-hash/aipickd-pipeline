name: Freshness & Live Check

on:
  schedule:
    # Every Monday at 10am UTC (4am Mexico) — weekly health check
    - cron: "0 10 * * 1"
  workflow_dispatch:
    inputs:
      stale_days:
        description: "Days to consider an article stale"
        required: false
        default: "180"
      check_count:
        description: "Number of articles to live-check"
        required: false
        default: "30"

permissions:
  contents: read

# May update articles' freshness status — share mutations group.
concurrency:
  group: aipickd-mutations
  cancel-in-progress: false

jobs:
  freshness-and-live:
    name: Freshness + live article check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup AIPickd environment
        uses: ./.github/actions/setup-env
        with:
          supabase-url: ${{ secrets.SUPABASE_URL }}
          supabase-service-role-key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          discord-webhook-alertas: ${{ secrets.DISCORD_WEBHOOK_ALERTAS }}
          discord-webhook-pipeline: ${{ secrets.DISCORD_WEBHOOK_PIPELINE }}

      - name: Run freshness checker
        run: |
          DAYS="${{ github.event.inputs.stale_days || '180' }}"
          node scripts/freshness-checker.js --days "$DAYS"

      - name: Run article live check
        run: |
          COUNT="${{ github.event.inputs.check_count || '30' }}"
          node scripts/article-live-check.js --count "$COUNT"
