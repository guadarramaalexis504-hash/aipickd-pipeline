name: Freshness & Live Check

on:
  schedule:
    # Every Monday at 10am UTC (4am Mexico) — weekly health check
    - cron: "0 10 * * 1"
  workflow_dispatch:
    inputs:
      stale_days:
        description: "Days to consider an article stale"
        required: false
        default: "180"
      check_count:
        description: "Number of articles to live-check"
        required: false
        default: "30"

permissions:
  contents: read

jobs:
  freshness-and-live:
    name: Freshness + live article check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --ignore-scripts

      - name: Reconstruct .env
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DISCORD_WEBHOOK_ALERTAS: ${{ secrets.DISCORD_WEBHOOK_ALERTAS }}
          DISCORD_WEBHOOK_PIPELINE: ${{ secrets.DISCORD_WEBHOOK_PIPELINE }}
        run: |
          umask 077
          {
            echo "SUPABASE_URL=\"${SUPABASE_URL}\""
            echo "SUPABASE_SERVICE_ROLE_KEY=\"${SUPABASE_SERVICE_ROLE_KEY}\""
            echo "DISCORD_WEBHOOK_ALERTAS=\"${DISCORD_WEBHOOK_ALERTAS}\""
            echo "DISCORD_WEBHOOK_PIPELINE=\"${DISCORD_WEBHOOK_PIPELINE}\""
          } > .env

      - name: Run freshness checker
        run: |
          DAYS="${{ github.event.inputs.stale_days || '180' }}"
          node scripts/freshness-checker.js --days "$DAYS"

      - name: Run article live check
        run: |
          COUNT="${{ github.event.inputs.check_count || '30' }}"
          node scripts/article-live-check.js --count "$COUNT"

      - name: Always shred .env
        if: always()
        run: rm -f .env
