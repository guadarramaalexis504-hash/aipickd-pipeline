name: Affiliate Link Health Check

on:
  schedule:
    # First Monday of each month at 8am UTC
    # (GitHub doesn't support "first Monday" directly, so we run every Monday and check day in script)
    - cron: "0 8 1-7 * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  affiliate-health:
    name: Check affiliate links
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup AIPickd environment
        uses: ./.github/actions/setup-env
        with:
          supabase-url: ${{ secrets.SUPABASE_URL }}
          supabase-service-role-key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          discord-webhook-alertas: ${{ secrets.DISCORD_WEBHOOK_ALERTAS }}

      - name: Run affiliate health check
        run: node scripts/affiliate-health-check.js
