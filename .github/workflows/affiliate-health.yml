name: Affiliate Link Health Check

on:
  schedule:
    # First Monday of each month at 8am UTC
    # (GitHub doesn't support "first Monday" directly, so we run every Monday and check day in script)
    - cron: "0 8 1-7 * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  affiliate-health:
    name: Check affiliate links
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --ignore-scripts

      - name: Reconstruct .env
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DISCORD_WEBHOOK_ALERTAS: ${{ secrets.DISCORD_WEBHOOK_ALERTAS }}
        run: |
          umask 077
          {
            echo "SUPABASE_URL=\"${SUPABASE_URL}\""
            echo "SUPABASE_SERVICE_ROLE_KEY=\"${SUPABASE_SERVICE_ROLE_KEY}\""
            echo "DISCORD_WEBHOOK_ALERTAS=\"${DISCORD_WEBHOOK_ALERTAS}\""
          } > .env

      - name: Run affiliate health check
        run: node scripts/affiliate-health-check.js

      - name: Always shred .env
        if: always()
        run: rm -f .env
