name: Weekly SEO Audit

on:
  schedule:
    # Every Sunday at 9am UTC (3am Mexico City) — results ready Monday morning
    - cron: "0 9 * * 0"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run mode (report only, no fixes)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

jobs:
  seo-audit:
    name: SEO audit — aipickd.com
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup AIPickd environment
        uses: ./.github/actions/setup-env
        with:
          supabase-url: ${{ secrets.SUPABASE_URL }}
          supabase-service-role-key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          wp-username: ${{ secrets.WP_USERNAME }}
          wp-admin-password: ${{ secrets.WP_ADMIN_PASSWORD || secrets.WP_APP_PASSWORD }}
          discord-webhook-alertas: ${{ secrets.DISCORD_WEBHOOK_ALERTAS }}

      - name: Run SEO audit (fix mode)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: node scripts/seo-audit.js --fix

      - name: Run SEO audit (dry-run mode)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: node scripts/seo-audit.js --dry-run
