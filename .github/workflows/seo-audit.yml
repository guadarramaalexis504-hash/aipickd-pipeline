name: Weekly SEO Audit

on:
  schedule:
    # Every Sunday at 9am UTC (3am Mexico City) — results ready Monday morning
    - cron: "0 9 * * 0"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run mode (report only, no fixes)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

jobs:
  seo-audit:
    name: SEO audit — aipickd.com
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --ignore-scripts

      - name: Reconstruct .env
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_ADMIN_PASSWORD: ${{ secrets.WP_ADMIN_PASSWORD }}
          DISCORD_WEBHOOK_ALERTAS: ${{ secrets.DISCORD_WEBHOOK_ALERTAS }}
        run: |
          umask 077
          {
            echo "SUPABASE_URL=\"${SUPABASE_URL}\""
            echo "SUPABASE_SERVICE_ROLE_KEY=\"${SUPABASE_SERVICE_ROLE_KEY}\""
            echo "WP_USERNAME=\"${WP_USERNAME}\""
            echo "WP_ADMIN_PASSWORD=\"${WP_ADMIN_PASSWORD}\""
            echo "DISCORD_WEBHOOK_ALERTAS=\"${DISCORD_WEBHOOK_ALERTAS}\""
          } > .env

      - name: Run SEO audit (fix mode)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: node scripts/seo-audit.js --fix

      - name: Run SEO audit (dry-run mode)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: node scripts/seo-audit.js --dry-run

      - name: Always shred .env
        if: always()
        run: rm -f .env
