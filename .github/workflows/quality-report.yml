name: Weekly Quality Report

on:
  schedule:
    # Cada lunes a las 10am CDMX (UTC-6) = 16:00 UTC
    - cron: "0 16 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: aipickd-quality-report
  cancel-in-progress: true

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      MONTHLY_BUDGET: "50"
      DAILY_BUDGET: "3"

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup AIPickd environment
        uses: ./.github/actions/setup-env
        with:
          supabase-url: ${{ secrets.SUPABASE_URL }}
          supabase-service-role-key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          discord-webhook-alertas: ${{ secrets.DISCORD_WEBHOOK_ALERTAS }}

      - name: Run weekly quality report
        env:
          DISCORD_WEBHOOK_REPORTES: ${{ secrets.DISCORD_WEBHOOK_REPORTES }}
        run: node scripts/quality-report.js
