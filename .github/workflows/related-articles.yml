name: AIPickd Related Articles

# Appends/refreshes a "Related articles" block on published posts (internal
# links → impressions + dwell time). Idempotent, so the weekly cron keeps blocks
# fresh as new articles publish. Run manually with go=false first to preview.

on:
  schedule:
    - cron: "30 6 * * 1" # Mondays 06:30 UTC
  workflow_dispatch:
    inputs:
      go:
        description: "Apply for real (passes --go)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      only:
        description: "Single article id (optional)"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: aipickd-mutations
  cancel-in-progress: false

jobs:
  related:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup AIPickd environment
        uses: ./.github/actions/setup-env
        with:
          supabase-url: ${{ secrets.SUPABASE_URL }}
          supabase-service-role-key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          wp-username: ${{ secrets.WP_USERNAME }}
          wp-admin-password: ${{ secrets.WP_ADMIN_PASSWORD }}
          discord-webhook-alertas: ${{ secrets.DISCORD_WEBHOOK_ALERTAS }}

      - name: Add related-articles blocks
        run: |
          WRITE=""
          if [ "${{ github.event.inputs.go }}" = "true" ]; then WRITE="--go"; fi
          ONLY=""
          if [ -n "${{ github.event.inputs.only }}" ]; then ONLY="--only ${{ github.event.inputs.only }}"; fi
          # Scheduled runs apply automatically; manual runs default to preview.
          if [ "${{ github.event_name }}" = "schedule" ]; then WRITE="--go"; fi
          node scripts/add-related-articles.js $WRITE $ONLY
