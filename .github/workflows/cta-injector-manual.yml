name: CTA Injector (manual run)

# Manually-triggered standalone runner for scripts/cta-injector.js.
# The same script runs as a continue-on-error post-step inside the main
# generate.yml workflow on every cron run, but we sometimes need to
# re-inject CTAs/reading-time into articles outside that window —
# for example after fix-stale-html.yml rewrote a batch of HTML and
# stripped the previously-injected reading-time block.

on:
  workflow_dispatch:
    inputs:
      hours:
        description: "How many hours back to scan (default 6)"
        required: false
        default: "6"
      mode:
        description: "Dry run (logs only) or live (writes to WP)"
        required: false
        default: "live"
        type: choice
        options: ["live", "dry-run"]

permissions:
  contents: read

concurrency:
  group: aipickd-cta-injector
  cancel-in-progress: false

jobs:
  inject:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup AIPickd environment
        uses: ./.github/actions/setup-env
        with:
          supabase-url: ${{ secrets.SUPABASE_URL }}
          supabase-service-role-key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          wp-username: ${{ secrets.WP_USERNAME }}
          wp-admin-password: ${{ secrets.WP_ADMIN_PASSWORD }}
          discord-webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          discord-webhook-articulos: ${{ secrets.DISCORD_WEBHOOK_ARTICULOS }}
          discord-webhook-pipeline: ${{ secrets.DISCORD_WEBHOOK_PIPELINE }}
          discord-webhook-alertas: ${{ secrets.DISCORD_WEBHOOK_ALERTAS }}

      - name: Run cta-injector
        env:
          HOURS: ${{ github.event.inputs.hours || '6' }}
          MODE: ${{ github.event.inputs.mode || 'live' }}
        run: |
          ARGS=(--hours "$HOURS")
          if [ "$MODE" != "dry-run" ]; then ARGS+=(--go); fi
          echo "Running: node scripts/cta-injector.js ${ARGS[*]}"
          node scripts/cta-injector.js "${ARGS[@]}"
