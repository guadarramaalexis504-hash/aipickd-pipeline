name: Fix Stale HTML (re-render affected articles)

# Manually-triggered repair workflow for articles affected by mdToHtml
# regressions (stray code fences, duplicate H1). Reads markdown from
# Supabase, re-renders HTML via the current mdToHtml(), and PATCHes the
# WP post content. Safe to re-run — idempotent on clean articles.

on:
  workflow_dispatch:
    inputs:
      hours:
        description: "How many hours back to scan (default 24)"
        required: false
        default: "24"
      slug:
        description: "Fix a single article by slug (optional, overrides hours)"
        required: false
        default: ""
      dry_run:
        description: "Dry-run only (no WP writes)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  contents: read

concurrency:
  # Shares the mutation lock: rewrites WP post HTML, same as generate.yml's
  # post-steps — they must not run concurrently on the same posts.
  group: aipickd-mutations
  cancel-in-progress: false

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup AIPickd environment
        uses: ./.github/actions/setup-env
        with:
          supabase-url: ${{ secrets.SUPABASE_URL }}
          supabase-service-role-key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          wp-username: ${{ secrets.WP_USERNAME }}
          wp-admin-password: ${{ secrets.WP_ADMIN_PASSWORD }}
          discord-webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          discord-webhook-articulos: ${{ secrets.DISCORD_WEBHOOK_ARTICULOS }}
          discord-webhook-pipeline: ${{ secrets.DISCORD_WEBHOOK_PIPELINE }}
          discord-webhook-alertas: ${{ secrets.DISCORD_WEBHOOK_ALERTAS }}

      - name: Run fix-stale-html
        env:
          HOURS: ${{ github.event.inputs.hours || '24' }}
          SLUG: ${{ github.event.inputs.slug || '' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          ARGS=()
          if [ "$DRY_RUN" != "true" ]; then ARGS+=(--go); fi
          if [ -n "$SLUG" ]; then ARGS+=(--slug "$SLUG"); fi
          if [ -z "$SLUG" ]; then ARGS+=(--hours "$HOURS"); fi
          echo "Running: node scripts/fix-stale-html.js ${ARGS[*]}"
          node scripts/fix-stale-html.js "${ARGS[@]}"

      - name: Notify Discord — fix completed
        if: success()
        run: |
          node -e "
          const { notifyPipeline } = require('./scripts/notify.js');
          notifyPipeline('🔧 fix-stale-html ran successfully. Check #articulos for updated previews.', { articlesGenerated: 0, keywordsRemaining: 0, postStepsFailed: [] })
            .then(r => console.log('Discord:', r.ok ? 'OK' : r.reason || r.status));
          "

      - name: Notify Discord — fix failed
        if: failure()
        run: |
          node -e "
          const { notifyAlert } = require('./scripts/notify.js');
          notifyAlert('fix-stale-html FAILED — see logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}', 'warning')
            .then(r => console.log('Alert:', r.ok ? 'OK' : r.reason));
          "
