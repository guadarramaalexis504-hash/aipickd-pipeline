name: Dead Man's Switch

on:
  schedule:
    # Check every day at 9am UTC (3am Mexico City)
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      hours:
        description: "Alert if pipeline silent for more than N hours"
        required: false
        default: "12"

permissions:
  actions: read
  contents: read

jobs:
  check:
    name: Check pipeline is alive
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup AIPickd environment
        uses: ./.github/actions/setup-env
        with:
          supabase-url: ${{ secrets.SUPABASE_URL }}
          supabase-service-role-key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          discord-webhook-alertas: ${{ secrets.DISCORD_WEBHOOK_ALERTAS }}

      - name: Run dead man's switch check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          HOURS="${{ github.event.inputs.hours || '12' }}"
          node scripts/deadmans-check.js --hours "$HOURS"
