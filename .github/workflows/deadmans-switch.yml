name: Dead Man's Switch

on:
  schedule:
    # Check every day at 9am UTC (3am Mexico City)
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      hours:
        description: "Alert if pipeline silent for more than N hours"
        required: false
        default: "12"

permissions:
  actions: read
  contents: read

jobs:
  check:
    name: Check pipeline is alive
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --ignore-scripts

      - name: Reconstruct .env (Discord only)
        env:
          DISCORD_WEBHOOK_ALERTAS: ${{ secrets.DISCORD_WEBHOOK_ALERTAS }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          umask 077
          {
            echo "DISCORD_WEBHOOK_ALERTAS=\"${DISCORD_WEBHOOK_ALERTAS}\""
            echo "SUPABASE_URL=\"${SUPABASE_URL}\""
            echo "SUPABASE_SERVICE_ROLE_KEY=\"${SUPABASE_SERVICE_ROLE_KEY}\""
          } > .env

      - name: Run dead man's switch check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          HOURS="${{ github.event.inputs.hours || '12' }}"
          node scripts/deadmans-check.js --hours "$HOURS"

      - name: Always shred .env
        if: always()
        run: rm -f .env
