name: Auto-Refill Keyword Queue

on:
  schedule:
    # Every Sunday 8pm CDMX (UTC-6) = Monday 02:00 UTC
    - cron: "0 2 * * 1"
  workflow_dispatch:
    inputs:
      count:
        description: "Number of keywords to generate (default: 30)"
        required: false
        default: "30"

permissions:
  contents: read

# Mutates Supabase keywords table — share concurrency with generate.yml
# to avoid races on the keyword queue.
concurrency:
  group: aipickd-mutations
  cancel-in-progress: false

jobs:
  refill:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup AIPickd environment
        uses: ./.github/actions/setup-env
        with:
          supabase-url: ${{ secrets.SUPABASE_URL }}
          supabase-service-role-key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          discord-webhook-alertas: ${{ secrets.DISCORD_WEBHOOK_ALERTAS }}
          discord-webhook-pipeline: ${{ secrets.DISCORD_WEBHOOK_PIPELINE }}

      - name: Generate keywords
        run: |
          COUNT="${{ github.event.inputs.count || '30' }}"
          node scripts/auto-keywords.js --force --count "$COUNT"
