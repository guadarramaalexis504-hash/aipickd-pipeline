name: AIPickd Publish Pending Drafts (manual)

# Standalone publish trigger that bypasses generation entirely. Useful when
# generation is producing drafts but publish silently no-ops (the bug we hit
# 2026-05-25). Cheap to run — no OpenAI calls.
#
# Trigger:
#   - workflow_dispatch only (no cron). The main generate.yml handles the
#     scheduled cadence; this is for manual recovery + bot-driven retries.

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Max drafts to publish (1-20)"
        required: false
        default: "5"
      go:
        description: "Publish for real (passes --go)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      only:
        description: "Publish exactly one draft by article id (controlled go-live)"
        required: false
        default: ""

permissions:
  contents: read

# Share the mutation lock with generate.yml so we never write concurrently
# to the same Supabase rows.
concurrency:
  group: aipickd-mutations
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup AIPickd environment
        uses: ./.github/actions/setup-env
        with:
          supabase-url: ${{ secrets.SUPABASE_URL }}
          supabase-service-role-key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          wp-username: ${{ secrets.WP_USERNAME }}
          wp-admin-password: ${{ secrets.WP_ADMIN_PASSWORD }}
          discord-webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          discord-webhook-articulos: ${{ secrets.DISCORD_WEBHOOK_ARTICULOS }}
          discord-webhook-pipeline: ${{ secrets.DISCORD_WEBHOOK_PIPELINE }}
          discord-webhook-alertas: ${{ secrets.DISCORD_WEBHOOK_ALERTAS }}

      - name: Validate secrets (with WP auth probe)
        # --probe also tries WP /users/me?context=edit so a rotated
        # Application Password fails this step instead of silently
        # breaking every publish iter.
        run: node scripts/validate-secrets.js --probe

      - name: Publish pending drafts
        run: |
          WRITE=""
          if [ "${{ github.event.inputs.go }}" = "true" ]; then WRITE="--go"; fi
          ONLY=""
          if [ -n "${{ github.event.inputs.only }}" ]; then ONLY="--only ${{ github.event.inputs.only }}"; fi
          node scripts/publish-pending-drafts.js --limit "${{ github.event.inputs.limit || '5' }}" $WRITE $ONLY
