name: "Refresh Old Article Titles (CTR optimization)"

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: "Articles to refresh (1-10)"
        required: false
        default: "5"
      dry_run:
        description: "Dry run (no writes)"
        required: false
        type: choice
        options:
          - "false"
          - "true"
        default: "false"

permissions:
  contents: read

concurrency:
  group: aipickd-mutations
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup AIPickd environment
        uses: ./.github/actions/setup-env
        with:
          supabase-url: ${{ secrets.SUPABASE_URL }}
          supabase-service-role-key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          wp-username: ${{ secrets.WP_USERNAME }}
          wp-admin-password: ${{ secrets.WP_ADMIN_PASSWORD || secrets.WP_APP_PASSWORD }}
          discord-webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          discord-webhook-pipeline: ${{ secrets.DISCORD_WEBHOOK_PIPELINE }}

      - name: Run refresh script
        env:
          LIMIT: ${{ github.event.inputs.limit || '5' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          DRY_FLAG=""
          if [ "$DRY_RUN" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi
          node scripts/refresh-titles.js --limit $LIMIT $DRY_FLAG
