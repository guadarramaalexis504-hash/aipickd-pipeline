name: WP Password Rotation Reminder

on:
  schedule:
    # First day of every quarter at 09:00 UTC.
    - cron: "0 9 1 1,4,7,10 *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  reminder:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Open quarterly rotation issue
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            const title = `Rotate WP_ADMIN_PASSWORD (quarterly) — ${today}`;

            // Avoid duplicates: skip if an open issue with the same title exists.
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "rotation",
              per_page: 50,
            });
            if (existing.some((i) => i.title === title)) {
              core.info(`Issue already exists for ${today} — skipping.`);
              return;
            }

            const body = [
              "Quarterly reminder: rotate the WordPress Application Password used by the pipeline.",
              "",
              "**Steps:**",
              "1. Log in to https://aipickd.com/wp-admin/profile.php → Application Passwords.",
              "2. Revoke the existing entry named `aipickd-pipeline`.",
              "3. Create a new one named `aipickd-pipeline-" + today.slice(0, 7) + "` (24-char output).",
              "4. Update GitHub Secrets → `WP_ADMIN_PASSWORD` with the new value (preserve spaces).",
              "5. Re-run `generate.yml` manually with `gen_count=1` to verify it still publishes.",
              "6. Close this issue.",
              "",
              "_Auto-generated by `.github/workflows/wp-password-rotation-reminder.yml`._",
            ].join("\n");

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ["rotation", "security", "pinned"],
            });

            core.notice(`Opened rotation reminder issue: ${title}`);
