name: Fix Sitemap Providers (one-time)

on:
  workflow_dispatch:

# Minimal permissions
permissions:
  contents: read

concurrency:
  group: aipickd-fix-sitemap
  cancel-in-progress: false

jobs:
  fix:
    name: Remove taxonomy/user pages from WP sitemap
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --ignore-scripts || npm install --no-audit --no-fund --ignore-scripts

      - name: Reconstruct .env
        env:
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_ADMIN_PASSWORD: ${{ secrets.WP_ADMIN_PASSWORD }}
          DISCORD_WEBHOOK_ALERTAS: ${{ secrets.DISCORD_WEBHOOK_ALERTAS }}
        run: |
          umask 077
          {
            echo "WP_USERNAME=\"${WP_USERNAME}\""
            echo "WP_ADMIN_PASSWORD=\"${WP_ADMIN_PASSWORD}\""
            echo "DISCORD_WEBHOOK_ALERTAS=\"${DISCORD_WEBHOOK_ALERTAS}\""
          } > .env

      - name: Fix taxonomy/user noindex-sitemap conflict
        run: node scripts/fix-taxonomy-sitemap.js

      - name: Verify sitemap after fix
        run: |
          echo "=== Sitemap after fix ==="
          curl -s https://aipickd.com/wp-sitemap.xml | grep -E '<loc>|sitemap' | head -20

      - name: Always shred .env
        if: always()
        run: |
          if [ -f .env ]; then
            shred -u .env 2>/dev/null || rm -f .env
          fi
