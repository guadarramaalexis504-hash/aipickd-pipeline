name: Fix Sitemap Providers (one-time)

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: aipickd-fix-sitemap
  cancel-in-progress: false

jobs:
  fix:
    name: Remove taxonomy/user pages from WP sitemap
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup AIPickd environment
        uses: ./.github/actions/setup-env
        with:
          # Supabase not used by this script but the composite action requires the
          # creds to be present. Pass real values so config validation passes.
          supabase-url: ${{ secrets.SUPABASE_URL }}
          supabase-service-role-key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          wp-username: ${{ secrets.WP_USERNAME }}
          wp-admin-password: ${{ secrets.WP_ADMIN_PASSWORD || secrets.WP_APP_PASSWORD }}
          discord-webhook-alertas: ${{ secrets.DISCORD_WEBHOOK_ALERTAS }}

      - name: Fix taxonomy/user noindex-sitemap conflict
        run: node scripts/fix-taxonomy-sitemap.js

      - name: Verify sitemap after fix
        run: |
          echo "=== Sitemap after fix ==="
          curl -s https://aipickd.com/wp-sitemap.xml | grep -E '<loc>|sitemap' | head -20
