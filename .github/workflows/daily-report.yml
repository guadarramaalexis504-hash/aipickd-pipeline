name: Daily Digest

on:
  schedule:
    # 9am Ciudad de México (UTC-6) = 15:00 UTC
    - cron: "0 15 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: aipickd-daily
  cancel-in-progress: true

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      MONTHLY_BUDGET: "50"
      DAILY_BUDGET: "3"

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup AIPickd environment
        uses: ./.github/actions/setup-env
        with:
          supabase-url: ${{ secrets.SUPABASE_URL }}
          supabase-service-role-key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          discord-webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          discord-webhook-pipeline: ${{ secrets.DISCORD_WEBHOOK_PIPELINE }}
          discord-webhook-alertas: ${{ secrets.DISCORD_WEBHOOK_ALERTAS }}
          discord-webhook-reportes: ${{ secrets.DISCORD_WEBHOOK_REPORTES }}

      - name: Send daily digest to Discord
        env:
          DISCORD_WEBHOOK_REPORTES: ${{ secrets.DISCORD_WEBHOOK_REPORTES }}
        run: node scripts/daily-report.js
