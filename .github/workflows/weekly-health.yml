name: Weekly Health Audit

on:
  schedule:
    # Every Sunday at 10am UTC (4am Mexico City)
    - cron: "0 10 * * 0"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: aipickd-weekly-health
  cancel-in-progress: true

jobs:
  health:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup AIPickd environment
        uses: ./.github/actions/setup-env
        with:
          supabase-url: ${{ secrets.SUPABASE_URL }}
          supabase-service-role-key: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          wp-username: ${{ secrets.WP_USERNAME }}
          wp-admin-password: ${{ secrets.WP_ADMIN_PASSWORD }}
          discord-webhook-alertas: ${{ secrets.DISCORD_WEBHOOK_ALERTAS }}

      - name: SEO audit (meta, titles, images, thin content)
        run: node scripts/seo-audit.js --fix

      - name: Content health (duplicates, stale dates, no images)
        run: node scripts/content-health.js

      - name: Broken link checker (external links)
        run: node scripts/link-health.js

      - name: Dedup WordPress posts
        run: node scripts/dedup-wordpress.js --fix --quiet

      - name: Fix taxonomy/user noindex-sitemap conflict
        run: node scripts/fix-taxonomy-sitemap.js
